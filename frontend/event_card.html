<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventPro — Detalle del Evento</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/event_card.css">
</head>
<body>

  <!-- ══════════════════════════════════════════
       NAVBAR
  ══════════════════════════════════════════ -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 6v6l4 2"/>
      </svg>
      EventPro
    </a>
    <a href="index.html" class="nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Volver a eventos
    </a>
  </nav>

  <!-- ══════════════════════════════════════════
       ESTADO: CARGANDO
  ══════════════════════════════════════════ -->
  <div class="state-wrap" id="stateLoading">
    <div class="spinner-ring"></div>
    <p>Cargando evento…</p>
  </div>

  <!-- ══════════════════════════════════════════
       ESTADO: ERROR
  ══════════════════════════════════════════ -->
  <div class="state-wrap hidden" id="stateError">
    <div class="state-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <p id="errorMsg">No se pudo cargar el evento.</p>
    <a href="index.html" class="btn-outline">Ver todos los eventos</a>
  </div>

  <!-- ══════════════════════════════════════════
       CONTENIDO PRINCIPAL
  ══════════════════════════════════════════ -->
  <main class="detail-wrap hidden" id="detailContent">

    <!-- ── HERO ── -->
    <section class="hero">

      <div class="hero-media">
        <!-- Imagen → ajusta al campo real: imagen_url / imagen / imagen_promotional -->
        <img id="heroImg" src="" alt="" class="hero-img hidden">
        <!-- Placeholder si no hay imagen -->
        <div class="hero-placeholder" id="heroPlaceholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <div class="hero-overlay"></div>
      </div>

      <div class="hero-info">
        <!-- Categoría → ajusta al campo: categoria / categoria_nombre / cat.nombre -->
        <span class="badge-cat" id="heroCategory"></span>

        <!-- Nombre → ajusta al campo: nombre / nombre_evento -->
        <h1 class="hero-title" id="heroTitle"></h1>

        <div class="hero-chips">
          <!-- Fecha → ajusta al campo: fecha / fecha_evento -->
          <div class="chip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8"  y1="2" x2="8"  y2="6"/>
              <line x1="3"  y1="10" x2="21" y2="10"/>
            </svg>
            <span id="heroDateText"></span>
          </div>
          <!-- Precio → ajusta al campo: valor / precio / costo -->
          <div class="chip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="1" x2="12" y2="23"/>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
            <span id="heroPriceText"></span>
          </div>
        </div>
      </div>

    </section>

    <!-- ── CUERPO ── -->
    <div class="detail-body">

      <!-- Descripción -->
      <article class="detail-article">
        <div class="article-label">Sobre este evento</div>
        <!-- Descripción → ajusta al campo: descripcion / descripcion_evento -->
        <p class="detail-description" id="detailDescription"></p>
      </article>

      <!-- Panel de interés RF-06 -->
      <aside class="interest-panel">

        <div class="interest-header">
          <div class="interest-counter">
            <span class="counter-number" id="interestCount">0</span>
            <span class="counter-label">personas interesadas</span>
          </div>
        </div>

        <button class="btn-interest" id="btnInterest" onclick="markInterest()">
          <svg class="heart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          <span id="btnInterestText">Estoy interesado</span>
        </button>

        <p class="interest-hint" id="interestHint">Haz clic para registrar tu interés en este evento</p>

      </aside>

    </div>

  </main>

  <script type="module" src="js/event_card.js"></script>
</body>
</html>
