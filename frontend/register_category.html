<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventPro — Nueva Categoría</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/register.css">
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 6v6l4 2"/>
    </svg>
    EventPro
  </div>

  <div class="nav-section-label">Gestionar</div>

  <a href="register_event.html" class="nav-item">
    <span class="nav-dot"></span>
    Eventos
  </a>
  <a href="edit_event.html" class="nav-item nav-sub">
    <span class="nav-sub-dot"></span>
    Editar
  </a>
  <a href="disable_event.html" class="nav-item nav-sub">
    <span class="nav-sub-dot"></span>
    Inactivar
  </a>
  <a href="register_category.html" class="nav-item active">
    <span class="nav-dot"></span>
    Categorías
  </a>
  <a href="edit_category.html" class="nav-item nav-sub">
    <span class="nav-sub-dot"></span>
    Editar
  </a>
  <a href="disable_category.html" class="nav-item nav-sub">
    <span class="nav-sub-dot"></span>
    Eliminar
  </a>
</aside>

<main class="main">

  <div class="page-header">
    <div>
      <h1 class="page-title">Nueva Categoría<span>.</span></h1>
      <div class="breadcrumb">
        <a href="#">Categorías</a>
        &rsaquo;
        Crear nueva
      </div>
    </div>
    <a href="#" class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Volver
    </a>
  </div>

  <form id="categoryForm" novalidate>
    <div class="form-card">

      <div class="section-title">Información de la categoría</div>

      <div class="form-grid">

        <div class="field full" id="field-nombre">
          <label>Nombre de la categoría <span class="req">*</span></label>
          <input
            type="text"
            id="cat-nombre"
            placeholder="Ej: Música, Teatro, Deporte…"
            maxlength="100"
          >
          <span class="err-msg">El nombre es obligatorio y no puede superar 100 caracteres.</span>
        </div>

      </div>

      <hr class="divider">

      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="resetCategoryForm()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-4.12"/>
          </svg>
          Limpiar
        </button>
        <button type="submit" class="btn btn-primary" id="submitCatBtn">
          <div class="spinner"></div>
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span>Guardar categoría</span>
        </button>
      </div>

    </div>
  </form>

</main>

<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toastMsg"></span>
</div>

<script type="module" src="js/categories.js"></script>
</body>
</html>
