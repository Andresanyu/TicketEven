<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicketEven — Gestión de Categorías</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/categories.css">
</head>
<body>

  <!-- ══════════════════════════════════
       SIDEBAR
  ══════════════════════════════════ -->
  <aside class="sidebar">

    <div class="sidebar-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 6v6l4 2"/>
      </svg>
      TicketEven
    </div>

    <nav class="sidebar-nav">
      <span class="nav-section-label">Principal</span>

      <a href="admin_dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Inicio
      </a>

      <a href="register.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8"  y1="2" x2="8"  y2="6"/>
          <line x1="3"  y1="10" x2="21" y2="10"/>
          <line x1="12" y1="14" x2="12" y2="18"/>
          <line x1="10" y1="16" x2="14" y2="16"/>
        </svg>
        Eventos
      </a>

      <a href="categories.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7h7M3 12h7M3 17h7"/>
          <rect x="13" y="5" width="8" height="4" rx="1"/>
          <rect x="13" y="10" width="8" height="4" rx="1"/>
          <rect x="13" y="15" width="8" height="4" rx="1"/>
        </svg>
        Categorías
        <span class="nav-active-bar"></span>
      </a>

      <a href="reportes.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6"  y1="20" x2="6"  y2="14"/>
          <polyline points="2 20 22 20"/>
        </svg>
        Reportes
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-admin">
        <div class="admin-avatar" id="sidebarAvatar">A</div>
        <div class="admin-info">
          <span class="admin-name" id="sidebarName">Administrador</span>
          <span class="admin-role">Admin</span>
        </div>
      </div>
    </div>

  </aside>

  <!-- ══════════════════════════════════
       CONTENIDO PRINCIPAL
  ══════════════════════════════════ -->
  <div class="main">

    <!-- ── Page Header ── -->
    <header class="page-header" style="--delay:0ms">
      <div class="page-header-left">
        <p class="page-eyebrow">
          <a href="admin_dashboard.html" class="breadcrumb-link">Panel</a>
          <span class="breadcrumb-sep">›</span>
          Categorías
        </p>
        <h1 class="page-title">Gestión de Categorías<span class="title-dot">.</span></h1>
      </div>
      <!-- Botón Nueva Categoría -->
      <button class="btn-primary" id="btnNueva">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Nueva Categoría
      </button>
    </header>

    <!-- ── Barra de búsqueda ── -->
    <div class="toolbar" style="--delay:60ms">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Buscar categoría…"
        >
      </div>
      <span class="table-count" id="tableCount">— categorías</span>
    </div>

    <!-- ── Tabla ── -->
    <div class="table-wrap" style="--delay:120ms">
      <table class="cat-table" id="catTable">
        <thead>
          <tr>
            <th class="col-id">ID</th>
            <th class="col-name">Nombre de Categoría</th>
            <th class="col-status">Estado</th>
            <th class="col-actions">Acciones</th>
          </tr>
        </thead>
        <tbody id="catTbody"></tbody>
      </table>

      <!-- Estado vacío (se muestra si no hay resultados) -->
      <div class="table-empty hidden" id="tableEmpty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M3 7h7M3 12h7M3 17h7"/>
          <rect x="13" y="5" width="8" height="4" rx="1"/>
          <rect x="13" y="10" width="8" height="4" rx="1"/>
          <rect x="13" y="15" width="8" height="4" rx="1"/>
        </svg>
        <p>No se encontraron categorías</p>
      </div>
    </div>

  </div><!-- /main -->


  <!-- ══════════════════════════════════
       MODAL — CREAR / EDITAR
  ══════════════════════════════════ -->
  <div class="modal-backdrop hidden" id="modalBackdrop">
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">

      <!-- Cabecera -->
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Nueva Categoría</h2>
        <button class="modal-close" id="btnCloseModal" aria-label="Cerrar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Formulario -->
      <div class="modal-body">

        <!-- Campo oculto para el ID (en edición) -->
        <input type="hidden" id="modalId">

        <!-- Nombre -->
        <div class="field" id="field-nombre">
          <label class="field-label" for="modalNombre">
            Nombre de la categoría <span class="req">*</span>
          </label>
          <input
            type="text"
            id="modalNombre"
            class="field-input"
            placeholder="Ej. Música, Teatro, Deportes…"
            maxlength="100"
          >
          <span class="field-error" id="err-nombre"></span>
        </div>

        <!-- Estado -->
        <div class="field" id="field-estado">
          <label class="field-label" for="modalEstado">Estado</label>
          <div class="select-wrap">
            <select id="modalEstado" class="field-input field-select">
              <option value="true">Activo</option>
              <option value="false">Inactivo</option>
            </select>
            <svg class="select-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </div>

      </div>

      <!-- Footer con botones -->
      <div class="modal-footer">
        <button class="btn-ghost" id="btnCancelarModal">Cancelar</button>
        <button class="btn-primary" id="btnGuardar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span id="btnGuardarText">Guardar</span>
        </button>
      </div>

    </div>
  </div>


  <!-- ══════════════════════════════════
       MODAL DE CONFIRMACIÓN (eliminar)
  ══════════════════════════════════ -->
  <div class="modal-backdrop hidden" id="confirmBackdrop">
    <div class="modal modal-sm" id="confirmModal" role="dialog" aria-modal="true">

      <div class="modal-header">
        <h2 class="modal-title">Confirmar acción</h2>
        <button class="modal-close" id="btnCloseConfirm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <div class="confirm-warning">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <p id="confirmMsg">¿Deseas inactivar esta categoría?</p>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-ghost" id="btnCancelarConfirm">Cancelar</button>
        <button class="btn-danger" id="btnConfirmAction">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
          </svg>
          Confirmar
        </button>
      </div>

    </div>
  </div>

  <script type="module" src="js/categories.js"></script>

</body>
</html>
