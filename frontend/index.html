<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventPro — Eventos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">

</head>
<body>

<main class="main">

  <div class="page-header">
    <h1 class="page-title">Eventos<span>.</span></h1>

    <!-- ── BOTÓN ORDENAR (arriba derecha) ── -->
    <div class="sort-wrap" id="sortWrap">

      <button class="sort-btn" id="sortBtn" onclick="toggleSort()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3"  y1="6"  x2="21" y2="6"/>
          <line x1="6"  y1="12" x2="18" y2="12"/>
          <line x1="9"  y1="18" x2="15" y2="18"/>
        </svg>
        <span id="sortLabel">Ordenar</span>
        <div class="sort-dot"></div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      <div class="sort-dropdown" id="sortDrop">

        <div class="dd-label">Ordenar por</div>

        <div class="dd-item active" id="opt-default" onclick="applySort('default')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8"  y1="6"  x2="21" y2="6"/>
            <line x1="8"  y1="12" x2="21" y2="12"/>
            <line x1="8"  y1="18" x2="21" y2="18"/>
            <line x1="3"  y1="6"  x2="3.01" y2="6"/>
            <line x1="3"  y1="12" x2="3.01" y2="12"/>
            <line x1="3"  y1="18" x2="3.01" y2="18"/>
          </svg>
          Por defecto
          <svg class="dd-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>

        <hr class="dd-sep">

        <div class="dd-item" id="opt-date" onclick="applySort('date')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8"  y1="2" x2="8"  y2="6"/>
            <line x1="3"  y1="10" x2="21" y2="10"/>
          </svg>
          Próximo a vencer
          <svg class="dd-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>

        <div class="dd-item" id="opt-alpha" onclick="applySort('alpha')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="4 7 4 4 20 4 20 7"/>
            <line x1="9"  y1="20" x2="15" y2="20"/>
            <line x1="12" y1="4"  x2="12" y2="20"/>
          </svg>
          Alfabético (A → Z)
          <svg class="dd-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>

        <div class="dd-item" id="opt-category" onclick="applySort('category')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 7h7M3 12h7M3 17h7"/>
            <rect x="13" y="5" width="8" height="4" rx="1"/>
            <rect x="13" y="10" width="8" height="4" rx="1"/>
            <rect x="13" y="15" width="8" height="4" rx="1"/>
          </svg>
          Por categoría
          <svg class="dd-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>

      </div>
    </div>
    <!-- /BOTÓN ORDENAR -->

  </div>

  <div class="events-grid" id="grid"></div>

  <div class="load-more-wrap">
    <div style="text-align:center">
      <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">
        <span>Visualizar más</span>
        <span style="font-size:18px;line-height:1">↓</span>
      </button>
      <div class="count-badge" id="countBadge"></div>
    </div>
  </div>

</main>

<script type="module">
  import "./js/events.js";
</script>

</body>
</html>
