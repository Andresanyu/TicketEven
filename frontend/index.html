<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventPro — Eventos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  /* ── SORT BUTTON & DROPDOWN ── */
  .sort-wrap { position: relative; }

  .sort-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    user-select: none;
    transition: color .2s, border-color .2s, background .2s;
    letter-spacing: .3px;
  }

  .sort-btn svg       { width: 13px; height: 13px; flex-shrink: 0; }
  .sort-btn .chevron  { width: 11px; height: 11px; transition: transform .2s; }

  .sort-btn:hover,
  .sort-btn.open {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(198,241,53,.06);
  }

  .sort-btn.open .chevron { transform: rotate(180deg); }

  /* punto indicador de filtro activo */
  .sort-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    display: none;
    flex-shrink: 0;
  }
  .sort-btn.has-filter .sort-dot { display: block; }

  /* ── DROPDOWN ── */
  .sort-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 205px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 5px;
    box-shadow: 0 16px 48px rgba(0,0,0,.55);
    z-index: 200;
    opacity: 0;
    transform: translateY(-5px) scale(.97);
    pointer-events: none;
    transition: opacity .17s, transform .17s;
    transform-origin: top right;
  }

  .sort-dropdown.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }

  .dd-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 6px 9px 3px;
  }

  .dd-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 9px;
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
    transition: background .15s, color .15s;
    letter-spacing: .2px;
  }

  .dd-item svg        { width: 13px; height: 13px; flex-shrink: 0; opacity: .5; }
  .dd-item:hover      { background: rgba(198,241,53,.06); color: var(--text-primary); }
  .dd-item:hover svg  { opacity: 1; }
  .dd-item.active     { background: rgba(198,241,53,.1);  color: var(--accent); }
  .dd-item.active svg { opacity: 1; }

  .dd-check {
    margin-left: auto;
    width: 12px; height: 12px;
    color: var(--accent);
    opacity: 0;
    flex-shrink: 0;
  }
  .dd-item.active .dd-check { opacity: 1; }

  .dd-sep {
    border: none;
    border-top: 1px solid var(--border);
    margin: 3px 5px;
  }
</style>
</head>
<body>

<main class="main">

  <div class="page-header">
    <h1 class="page-title">Eventos<span>.</span></h1>

    <!-- ── BOTÓN ORDENAR (arriba derecha) ── -->
    <div class="sort-wrap" id="sortWrap">

      <button class="sort-btn" id="sortBtn" onclick="toggleSort()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3"  y1="6"  x2="21" y2="6"/>
          <line x1="6"  y1="12" x2="18" y2="12"/>
          <line x1="9"  y1="18" x2="15" y2="18"/>
        </svg>
        <span id="sortLabel">Ordenar</span>
        <div class="sort-dot"></div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      <div class="sort-dropdown" id="sortDrop">

        <div class="dd-label">Ordenar por</div>

        <div class="dd-item active" id="opt-default" onclick="applySort('default')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8"  y1="6"  x2="21" y2="6"/>
            <line x1="8"  y1="12" x2="21" y2="12"/>
            <line x1="8"  y1="18" x2="21" y2="18"/>
            <line x1="3"  y1="6"  x2="3.01" y2="6"/>
            <line x1="3"  y1="12" x2="3.01" y2="12"/>
            <line x1="3"  y1="18" x2="3.01" y2="18"/>
          </svg>
          Por defecto
          <svg class="dd-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>

        <hr class="dd-sep">

        <div class="dd-item" id="opt-date" onclick="applySort('date')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8"  y1="2" x2="8"  y2="6"/>
            <line x1="3"  y1="10" x2="21" y2="10"/>
          </svg>
          Próximo a vencer
          <svg class="dd-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>

        <div class="dd-item" id="opt-alpha" onclick="applySort('alpha')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="4 7 4 4 20 4 20 7"/>
            <line x1="9"  y1="20" x2="15" y2="20"/>
            <line x1="12" y1="4"  x2="12" y2="20"/>
          </svg>
          Alfabético (A → Z)
          <svg class="dd-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>

      </div>
    </div>
    <!-- /BOTÓN ORDENAR -->

  </div>

  <div class="events-grid" id="grid"></div>

  <div class="load-more-wrap">
    <div style="text-align:center">
      <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">
        <span>Visualizar más</span>
        <span style="font-size:18px;line-height:1">↓</span>
      </button>
      <div class="count-badge" id="countBadge"></div>
    </div>
  </div>

</main>

<script>
  /* ── Dropdown ── */
  function toggleSort() {
    var btn  = document.getElementById('sortBtn');
    var drop = document.getElementById('sortDrop');
    var open = drop.classList.toggle('open');
    btn.classList.toggle('open', open);
  }

  /* Cerrar al clicar fuera */
  document.addEventListener('click', function(e) {
    var wrap = document.getElementById('sortWrap');
    if (wrap && !wrap.contains(e.target)) {
      document.getElementById('sortDrop').classList.remove('open');
      document.getElementById('sortBtn').classList.remove('open');
    }
  });

  var SORT_LABELS = { 'default': 'Ordenar', 'date': 'Por fecha', 'alpha': 'A → Z' };

  /* Llamado desde el HTML; delega a events.js una vez cargado */
  function applySort(type) {
    /* Actualizar UI */
    ['default','date','alpha'].forEach(function(id) {
      document.getElementById('opt-' + id).classList.toggle('active', id === type);
    });
    document.getElementById('sortLabel').textContent = SORT_LABELS[type];
    document.getElementById('sortBtn').classList.toggle('has-filter', type !== 'default');

    /* Cerrar */
    document.getElementById('sortDrop').classList.remove('open');
    document.getElementById('sortBtn').classList.remove('open');

    /* Delegar a events.js */
    if (typeof window._applySort === 'function') window._applySort(type);
  }
</script>

<script type="module">
  import "./js/events.js";
</script>

</body>
</html>
