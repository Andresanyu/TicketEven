services:
  db:
    image: postgres:16-alpine
    container_name: ticket_event_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bases123}
      POSTGRES_DB: ${DB_NAME:-ticketeven}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Database/entities.sql:/docker-entrypoint-initdb.d/01_entities.sql:ro
      - ./Database/populate.sql:/docker-entrypoint-initdb.d/02_populate.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ticketeven}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: